services:
  mysql:
    image: mysql:8.4
    container_name: o2o-mysql
    environment:
      MYSQL_ROOT_PASSWORD: local-root-pass
      MYSQL_DATABASE: o2o_carpooling
      MYSQL_USER: o2o_app
      MYSQL_PASSWORD: local-app-pass
      TZ: Asia/Shanghai
    ports:
      # Host port is configurable to avoid clashing with a native MySQL on 3306.
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -plocal-root-pass --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: o2o-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: o2o-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: o2o
      RABBITMQ_DEFAULT_PASS: local-rabbit-pass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: o2o-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: o2o
      MONGO_INITDB_ROOT_PASSWORD: local-mongo-pass
      MONGO_INITDB_DATABASE: o2o_audit
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: o2o-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: o2o_minio
      MINIO_ROOT_PASSWORD: local-minio-pass
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  nacos:
    image: nacos/nacos-server:v2.5.1
    container_name: o2o-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  mongo-data:
  minio-data:
  nacos-data:
