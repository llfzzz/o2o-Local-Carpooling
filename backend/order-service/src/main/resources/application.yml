server:
  port: ${SERVER_PORT:8105}

spring:
  config:
    import: "optional:classpath:carpooling-providers.yml"
  application:
    name: order-service
  datasource:
    url: ${MYSQL_JDBC_URL:jdbc:mysql://127.0.0.1:3306/o2o_carpooling?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:o2o_app}
    password: ${MYSQL_PASSWORD:local-app-pass}
    hikari:
      # Explicit, env-overridable pool sizing so a bare launch never silently falls back to the
      # 10-connection default. Per-env HIKARI_* overrides win (the low-mem systemd profile sets
      # maximum-pool-size=2 / minimum-idle=0 / connection-timeout=120000).
      maximum-pool-size: ${HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MINIMUM_IDLE:2}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:o2o}
    password: ${RABBITMQ_PASSWORD:local-rabbit-pass}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    table: flyway_schema_history_order_service
    baseline-on-migrate: true
    baseline-version: 0
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        fail-fast: ${NACOS_FAIL_FAST:false}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

orders:
  payment-deadline: ${ORDER_PAYMENT_DEADLINE:PT15M}
  timeout-scan:
    fixed-delay: ${ORDER_TIMEOUT_SCAN_FIXED_DELAY:PT5M}
  messaging:
    publish-batch-size: ${ORDER_OUTBOX_PUBLISH_BATCH_SIZE:50}
    publish-fixed-delay: ${ORDER_OUTBOX_PUBLISH_FIXED_DELAY:PT10S}
    retry-delay: ${ORDER_OUTBOX_RETRY_DELAY:PT30S}
    timeout:
      delay-exchange: ${ORDER_TIMEOUT_DELAY_EXCHANGE:o2o.order.timeout.delay}
      delay-queue: ${ORDER_TIMEOUT_DELAY_QUEUE:o2o.order.timeout.delay.queue}
      delay-routing-key: ${ORDER_TIMEOUT_DELAY_ROUTING_KEY:order.payment.timeout.requested}
      expired-exchange: ${ORDER_TIMEOUT_EXPIRED_EXCHANGE:o2o.order.timeout.expired}
      expired-queue: ${ORDER_TIMEOUT_EXPIRED_QUEUE:o2o.order.timeout.expired.queue}
      expired-routing-key: ${ORDER_TIMEOUT_EXPIRED_ROUTING_KEY:order.payment.timeout.expired}
