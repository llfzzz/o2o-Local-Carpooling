server:
  port: ${SERVER_PORT:8101}

spring:
  application:
    name: auth-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
