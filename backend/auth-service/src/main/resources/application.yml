server:
  port: ${SERVER_PORT:8101}

spring:
  config:
    import: "optional:classpath:carpooling-providers.yml"
  application:
    name: auth-service
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

security:
  jwt:
    base64-secret: ${JWT_BASE64_SECRET:}
    token-validity: ${JWT_TOKEN_VALIDITY:PT2H}

auth:
  sms:
    code-length: ${AUTH_SMS_CODE_LENGTH:6}
    code-ttl: ${AUTH_SMS_CODE_TTL:PT5M}
    max-verify-attempts: ${AUTH_SMS_MAX_VERIFY_ATTEMPTS:5}
    # per-phone issuance throttle (in addition to the Gateway per-IP auth rate limit)
    issue-max-per-window: ${AUTH_SMS_ISSUE_MAX:5}
    issue-window: ${AUTH_SMS_ISSUE_WINDOW:PT10M}
