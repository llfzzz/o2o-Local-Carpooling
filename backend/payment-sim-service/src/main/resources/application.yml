server:
  port: ${SERVER_PORT:8106}

spring:
  config:
    import: "optional:classpath:carpooling-providers.yml"
  application:
    name: payment-sim-service
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  datasource:
    url: ${MYSQL_JDBC_URL:jdbc:mysql://127.0.0.1:3306/o2o_carpooling?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:o2o_app}
    password: ${MYSQL_PASSWORD:local-app-pass}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    table: flyway_schema_history_payment_sim_service
    baseline-on-migrate: true
    baseline-version: 0
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        fail-fast: ${NACOS_FAIL_FAST:false}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

# Payment webhook ingress secret + freshness window. providers.payment.type is selected per
# profile in carpooling-providers.yml; the secret comes only from the environment (never committed)
# and is validated against placeholders by SecretsValidator under staging/production.
providers:
  payment:
    webhook-secret: ${PAYMENT_WEBHOOK_SECRET:}
    callback-timestamp-tolerance: ${PAYMENT_CALLBACK_TOLERANCE:PT5M}
