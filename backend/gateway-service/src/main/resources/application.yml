server:
  port: ${SERVER_PORT:8080}
  # TLS-ready: off in demo, enable in staging/production by setting TLS_ENABLED=true and providing a
  # keystore via secure env config (the gateway then terminates HTTPS; HSTS header becomes meaningful).
  ssl:
    enabled: ${TLS_ENABLED:false}
    key-store: ${TLS_KEYSTORE:}
    key-store-password: ${TLS_KEYSTORE_PASSWORD:}
    key-store-type: ${TLS_KEYSTORE_TYPE:PKCS12}

spring:
  config:
    import: "optional:classpath:carpooling-providers.yml"
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        fail-fast: ${NACOS_FAIL_FAST:false}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
    gateway:
      server:
        webflux:
          # Standard security response headers on every proxied response (the supported, reliable
          # mechanism vs a custom filter). HSTS is only meaningful over HTTPS — add it in
          # staging/production alongside TLS.
          default-filters:
            - "AddResponseHeader=X-Content-Type-Options, nosniff"
            - "AddResponseHeader=X-Frame-Options, DENY"
            - "AddResponseHeader=Referrer-Policy, no-referrer"
            - "AddResponseHeader=X-XSS-Protection, 0"
            - "AddResponseHeader=Content-Security-Policy, default-src 'none'; frame-ancestors 'none'"
          globalcors:
            cors-configurations:
              '[/**]':
                # Per-environment CORS: each origin is env-overridable. demo defaults to the local Vite
                # dev origins; staging/production set GATEWAY_CORS_ORIGIN_* to real origins (no localhost)
                # and can blank out the unused slots.
                allowedOrigins:
                  - ${GATEWAY_CORS_ORIGIN_1:http://127.0.0.1:5173}
                  - ${GATEWAY_CORS_ORIGIN_2:http://localhost:5173}
                  - ${GATEWAY_CORS_ORIGIN_3:http://127.0.0.1:5174}
                  - ${GATEWAY_CORS_ORIGIN_4:http://localhost:5174}
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                exposedHeaders:
                  - X-Trace-Id
                allowCredentials: false
          routes:
            - id: auth-service
              uri: ${O2O_AUTH_SERVICE_URL:http://127.0.0.1:8101}
              predicates:
                - Path=/api/auth/**
            - id: user-service
              uri: ${O2O_USER_SERVICE_URL:http://127.0.0.1:8102}
              predicates:
                - Path=/api/users/**
            - id: driver-service
              uri: ${O2O_DRIVER_SERVICE_URL:http://127.0.0.1:8103}
              predicates:
                - Path=/api/drivers/**
            - id: trip-service
              uri: ${O2O_TRIP_SERVICE_URL:http://127.0.0.1:8104}
              predicates:
                - Path=/api/trips/**
            - id: trip-demo
              uri: ${O2O_TRIP_SERVICE_URL:http://127.0.0.1:8104}
              predicates:
                - Path=/api/demo/trips/**
            - id: order-service
              uri: ${O2O_ORDER_SERVICE_URL:http://127.0.0.1:8105}
              predicates:
                - Path=/api/orders/**
            - id: payment-sim-service
              uri: ${O2O_PAYMENT_SIM_SERVICE_URL:http://127.0.0.1:8106}
              predicates:
                - Path=/api/payments/**
            - id: file-service
              uri: ${O2O_FILE_SERVICE_URL:http://127.0.0.1:8108}
              predicates:
                - Path=/api/files/**
            - id: admin-service
              uri: ${O2O_ADMIN_SERVICE_URL:http://127.0.0.1:8110}
              predicates:
                - Path=/api/admin/**
            - id: map-service
              uri: ${O2O_MAP_SERVICE_URL:http://127.0.0.1:8107}
              predicates:
                - Path=/api/maps/**
            - id: map-service-compat
              uri: ${O2O_MAP_SERVICE_URL:http://127.0.0.1:8107}
              predicates:
                - Path=/api/map/**
            - id: ai-service
              uri: ${O2O_AI_SERVICE_URL:http://127.0.0.1:8109}
              predicates:
                - Path=/api/ai/**
            - id: audit-service
              uri: ${O2O_AUDIT_SERVICE_URL:http://127.0.0.1:8111}
              predicates:
                - Path=/api/audits/**
            - id: identity-service
              uri: ${O2O_IDENTITY_SERVICE_URL:http://127.0.0.1:8113}
              predicates:
                - Path=/api/identity/**
            - id: notification-inbox
              uri: ${O2O_NOTIFICATION_SERVICE_URL:http://127.0.0.1:8112}
              predicates:
                - Path=/api/inbox/**
            - id: notification-chat
              uri: ${O2O_NOTIFICATION_SERVICE_URL:http://127.0.0.1:8112}
              predicates:
                - Path=/api/conversations/**
            - id: notification-demo-control
              uri: ${O2O_NOTIFICATION_SERVICE_URL:http://127.0.0.1:8112}
              predicates:
                - Path=/api/demo/control/notification/**
            - id: payment-demo-control
              uri: ${O2O_PAYMENT_SIM_SERVICE_URL:http://127.0.0.1:8106}
              predicates:
                - Path=/api/demo/control/payment/**
            - id: identity-demo-control
              uri: ${O2O_IDENTITY_SERVICE_URL:http://127.0.0.1:8113}
              predicates:
                - Path=/api/demo/control/identity/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

security:
  jwt:
    base64-secret: ${JWT_BASE64_SECRET:}
    token-validity: ${JWT_TOKEN_VALIDITY:PT2H}
  rate-limit:
    backend: ${RATE_LIMIT_BACKEND:memory}
    auth:
      count: ${RATE_LIMIT_AUTH_COUNT:20}
      period: ${RATE_LIMIT_AUTH_PERIOD:PT60S}
    api:
      count: ${RATE_LIMIT_API_COUNT:120}
      period: ${RATE_LIMIT_API_PERIOD:PT60S}
    # Map calls cost external provider quota, so they get a tighter bucket of their own.
    map:
      count: ${RATE_LIMIT_MAP_COUNT:60}
      period: ${RATE_LIMIT_MAP_PERIOD:PT60S}
