server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import: "optional:classpath:carpooling-providers.yml"
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://127.0.0.1:5173"
                  - "http://localhost:5173"
                  - "http://127.0.0.1:5174"
                  - "http://localhost:5174"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                exposedHeaders:
                  - X-Trace-Id
                allowCredentials: false
          routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
            - id: driver-service
              uri: lb://driver-service
              predicates:
                - Path=/api/drivers/**
            - id: trip-service
              uri: lb://trip-service
              predicates:
                - Path=/api/trips/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**
            - id: payment-sim-service
              uri: lb://payment-sim-service
              predicates:
                - Path=/api/payments/**
            - id: file-service
              uri: lb://file-service
              predicates:
                - Path=/api/files/**
            - id: admin-service
              uri: lb://admin-service
              predicates:
                - Path=/api/admin/**
            - id: map-service
              uri: lb://map-service
              predicates:
                - Path=/api/maps/**
            - id: map-service-compat
              uri: lb://map-service
              predicates:
                - Path=/api/map/**
            - id: ai-service
              uri: lb://ai-service
              predicates:
                - Path=/api/ai/**
            - id: audit-service
              uri: lb://audit-service
              predicates:
                - Path=/api/audits/**
            - id: notification-demo-inbox
              uri: lb://notification-service
              predicates:
                - Path=/api/demo/inbox/**
            - id: notification-demo-control
              uri: lb://notification-service
              predicates:
                - Path=/api/demo/control/notification/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

security:
  jwt:
    base64-secret: ${JWT_BASE64_SECRET:}
    token-validity: ${JWT_TOKEN_VALIDITY:PT2H}
  rate-limit:
    backend: ${RATE_LIMIT_BACKEND:memory}
    auth:
      count: ${RATE_LIMIT_AUTH_COUNT:20}
      period: ${RATE_LIMIT_AUTH_PERIOD:PT60S}
    api:
      count: ${RATE_LIMIT_API_COUNT:120}
      period: ${RATE_LIMIT_API_PERIOD:PT60S}
