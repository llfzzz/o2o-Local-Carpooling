server:
  port: ${SERVER_PORT:8108}

spring:
  config:
    import: "optional:classpath:carpooling-providers.yml"
  application:
    name: file-service
  datasource:
    url: ${MYSQL_JDBC_URL:jdbc:mysql://127.0.0.1:3306/o2o_carpooling?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:o2o_app}
    password: ${MYSQL_PASSWORD:local-app-pass}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    table: flyway_schema_history_file_service
    baseline-on-migrate: true
    baseline-version: 0
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        fail-fast: ${NACOS_FAIL_FAST:false}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}

minio:
  endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
  bucket: ${MINIO_BUCKET:o2o-carpooling-private}
  access-key: ${MINIO_ACCESS_KEY:o2o_minio}
  secret-key: ${MINIO_SECRET_KEY:local-minio-pass}
  presign-upload-expiry: ${MINIO_PRESIGN_UPLOAD_EXPIRY:PT15M}
  presign-download-expiry: ${MINIO_PRESIGN_DOWNLOAD_EXPIRY:PT10M}
  max-upload-bytes: ${FILE_MAX_UPLOAD_BYTES:10485760}
  allowed-content-types: ${FILE_ALLOWED_CONTENT_TYPES:image/jpeg,image/jpg,image/png,image/webp,application/pdf}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
