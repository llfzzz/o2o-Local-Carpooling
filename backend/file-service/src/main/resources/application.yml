server:
  port: ${SERVER_PORT:8108}

spring:
  application:
    name: file-service
  datasource:
    url: ${MYSQL_JDBC_URL:jdbc:mysql://127.0.0.1:3306/o2o_carpooling?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:o2o_app}
    password: ${MYSQL_PASSWORD:local-app-pass}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    table: flyway_schema_history_file_service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}

minio:
  endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
  bucket: ${MINIO_BUCKET:o2o-carpooling-private}
  access-key: ${MINIO_ACCESS_KEY:}
  secret-key: ${MINIO_SECRET_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
