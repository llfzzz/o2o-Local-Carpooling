server:
  port: ${SERVER_PORT:8111}

spring:
  config:
    import: "optional:classpath:carpooling-providers.yml"
  application:
    name: audit-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://o2o:local-mongo-pass@127.0.0.1:27017/o2o_audit?authSource=admin}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        fail-fast: ${NACOS_FAIL_FAST:false}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
