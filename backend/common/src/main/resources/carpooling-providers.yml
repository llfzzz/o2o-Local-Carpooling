# Shared cross-service profile config for business-provider selection and demo mode.
# Imported by each service via:
#   spring.config.import: "optional:classpath:carpooling-providers.yml"
#
# Only EXTERNAL BUSINESS providers are switchable here (sms, ocr, payment, identity, map,
# notification). Infrastructure (MySQL/Redis/RabbitMQ/MongoDB/MinIO/Nacos) is always real and
# is never selected through this file.
#
# type=demo      -> interactive mock adapter, created only under the `demo` profile
# type=<vendor>  -> real adapter wired through secure environment configuration
# type empty     -> not configured: demo bean absent, real calls fail closed at invocation
---
spring:
  config:
    activate:
      on-profile: demo
app:
  demo-mode: true
  demo:
    control-enabled: true
    seed-enabled: true
    login-code-peek-enabled: true
    virtual-trips-enabled: true
providers:
  sms:
    type: demo
  ocr:
    type: demo
  payment:
    type: demo
  identity:
    type: demo
  # Map is the one provider that is useful to run for real while the rest stay mocked: it costs
  # only quota, never money, and it is the only way to see real geography in a demo. Defaults to
  # demo so nothing changes unless MAP_PROVIDER is set explicitly; the UI badges demo results, so
  # which one is active is always visible rather than inferred.
  map:
    type: ${MAP_PROVIDER:demo}
  notification:
    type: demo
---
spring:
  config:
    activate:
      on-profile: staging
app:
  demo-mode: false
  demo:
    control-enabled: false
    seed-enabled: false
    login-code-peek-enabled: false
    virtual-trips-enabled: false
providers:
  sms:
    type: ${SMS_PROVIDER:}
  ocr:
    type: ${OCR_PROVIDER:}
  payment:
    type: ${PAYMENT_PROVIDER:}
  identity:
    type: ${IDENTITY_PROVIDER:}
  map:
    type: ${MAP_PROVIDER:amap}
  notification:
    type: ${NOTIFICATION_PROVIDER:}
---
spring:
  config:
    activate:
      on-profile: production
app:
  demo-mode: false
  demo:
    control-enabled: false
    seed-enabled: false
    login-code-peek-enabled: false
    virtual-trips-enabled: false
providers:
  sms:
    type: ${SMS_PROVIDER:}
  ocr:
    type: ${OCR_PROVIDER:}
  payment:
    type: ${PAYMENT_PROVIDER:}
  identity:
    type: ${IDENTITY_PROVIDER:}
  map:
    type: ${MAP_PROVIDER:amap}
  notification:
    type: ${NOTIFICATION_PROVIDER:}
