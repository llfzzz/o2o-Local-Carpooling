server:
  port: ${SERVER_PORT:8104}

spring:
  config:
    import: "optional:classpath:carpooling-providers.yml"
  application:
    name: trip-service
  data:
    # Live driver positions are held in Redis so they are visible across instances and expire on
    # their own. Without Redis the service falls back to a single-instance in-memory store.
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  datasource:
    url: ${MYSQL_JDBC_URL:jdbc:mysql://127.0.0.1:3306/o2o_carpooling?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:o2o_app}
    password: ${MYSQL_PASSWORD:local-app-pass}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    table: flyway_schema_history_trip_service
    baseline-on-migrate: true
    baseline-version: 0
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        fail-fast: ${NACOS_FAIL_FAST:false}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}

# Matching and pricing are configuration, not constants: a market with sparse driver coverage needs
# wider radii than a dense one, and fares differ by region.
trip:
  matching:
    # How far a trip's start may be from the rider's start (pickup detour).
    origin-radius-meters: ${TRIP_MATCH_ORIGIN_RADIUS_METERS:3000}
    # Drop-off is allowed to be looser than pickup.
    destination-radius-meters: ${TRIP_MATCH_DESTINATION_RADIUS_METERS:5000}
    # Symmetric tolerance around the rider's target departure time.
    departure-window: ${TRIP_MATCH_DEPARTURE_WINDOW:PT2H}
    max-results: ${TRIP_MATCH_MAX_RESULTS:50}
  pricing:
    base-fare: ${TRIP_PRICING_BASE_FARE:6.00}
    included-km: ${TRIP_PRICING_INCLUDED_KM:3.0}
    per-km-fare: ${TRIP_PRICING_PER_KM_FARE:1.20}
    min-fare: ${TRIP_PRICING_MIN_FARE:6.00}
    currency: ${TRIP_PRICING_CURRENCY:CNY}
  # Live pickup tracking. Positions live in Redis only, never in MySQL: presence-ttl is both the
  # offline signal and the retention limit — nothing about a driver's whereabouts outlives it.
  tracking:
    presence-ttl: ${TRIP_TRACKING_PRESENCE_TTL:PT45S}
    max-updates: ${TRIP_TRACKING_MAX_UPDATES:12}
    update-window: ${TRIP_TRACKING_UPDATE_WINDOW:PT60S}
    stream-interval: ${TRIP_TRACKING_STREAM_INTERVAL:PT3S}
    stream-max-duration: ${TRIP_TRACKING_STREAM_MAX_DURATION:PT30M}
  # Demo virtual-trip generation. Distances are the authoritative map-service route distance; a
  # random place pair is accepted only inside [min, max] and preferred inside [preferred-min, max].
  # departure-spread stays under matching.departure-window so generated trips match trip-search.
  demo:
    min-distance-meters: ${TRIP_DEMO_MIN_DISTANCE_METERS:2000}
    max-distance-meters: ${TRIP_DEMO_MAX_DISTANCE_METERS:30000}
    preferred-min-meters: ${TRIP_DEMO_PREFERRED_MIN_METERS:5000}
    preferred-max-meters: ${TRIP_DEMO_PREFERRED_MAX_METERS:20000}
    max-attempts: ${TRIP_DEMO_MAX_ATTEMPTS:25}
    offers: ${TRIP_DEMO_OFFERS:5}
    departure-lead: ${TRIP_DEMO_DEPARTURE_LEAD:PT5M}
    departure-spread: ${TRIP_DEMO_DEPARTURE_SPREAD:PT110M}
    retention: ${TRIP_DEMO_RETENTION:PT24H}
    cleanup-fixed-delay: ${TRIP_DEMO_CLEANUP_FIXED_DELAY:PT1H}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
