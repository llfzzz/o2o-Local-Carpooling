server:
  port: ${SERVER_PORT:8107}

spring:
  config:
    import: "optional:classpath:carpooling-providers.yml"
  application:
    name: map-service
  datasource:
    url: ${MYSQL_JDBC_URL:jdbc:mysql://127.0.0.1:3306/o2o_carpooling?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:o2o_app}
    password: ${MYSQL_PASSWORD:local-app-pass}
    hikari:
      # Explicit, env-overridable pool sizing so a bare launch never silently falls back to the
      # 10-connection default. Per-env HIKARI_* overrides win (the low-mem systemd profile sets
      # maximum-pool-size=2 / minimum-idle=0 / connection-timeout=120000).
      maximum-pool-size: ${HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MINIMUM_IDLE:2}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    table: flyway_schema_history_map_service
    baseline-on-migrate: true
    baseline-version: 0
  # CACHE Redis (map route read-cache + cache-fill lease) — a SEPARATE, disposable instance, NOT the
  # state Redis. Lettuce connects lazily, so having this configured while the cache is disabled or the
  # instance is absent does not fail startup; cache/lease errors degrade to a MySQL/provider fallback.
  data:
    redis:
      host: ${CACHE_REDIS_HOST:127.0.0.1}
      port: ${CACHE_REDIS_PORT:6380}
      username: ${CACHE_REDIS_USERNAME:}
      password: ${CACHE_REDIS_PASSWORD:}
      ssl:
        enabled: ${CACHE_REDIS_SSL:false}
      timeout: ${CACHE_REDIS_TIMEOUT:2s}
      lettuce:
        pool:
          enabled: ${CACHE_REDIS_POOL_ENABLED:false}
          max-active: ${CACHE_REDIS_POOL_MAX_ACTIVE:8}
          max-idle: ${CACHE_REDIS_POOL_MAX_IDLE:8}
          min-idle: ${CACHE_REDIS_POOL_MIN_IDLE:0}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        fail-fast: ${NACOS_FAIL_FAST:false}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}

amap:
  api-key: ${AMAP_API_KEY:}
  base-url: ${AMAP_BASE_URL:https://restapi.amap.com}
  connect-timeout: ${AMAP_CONNECT_TIMEOUT:PT2S}
  read-timeout: ${AMAP_READ_TIMEOUT:PT5S}

# Supported-city allowlist, keyed by adcode prefix. City support is configuration, never a
# conditional in code — that is what lets the product serve arbitrary cities. An empty list means
# unrestricted, which is what local development and the demo profile use. A prefix enables every
# district beneath it, so `3502` enables all of 厦门.
#
# Example (set MAP_ENABLED_CITIES or override per environment):
#   map:
#     cities:
#       enabled:
#         - adcode-prefix: "3502"
#           name: 厦门
#           city-code: "0592"
map:
  route-cache:
    enabled: ${MAP_ROUTE_CACHE_ENABLED:true}
    fresh-ttl: ${MAP_ROUTE_CACHE_FRESH_TTL:PT30M}
    stale-if-error: ${MAP_ROUTE_CACHE_STALE_IF_ERROR:PT24H}
    # Optional Redis read-cache in front of the MySQL snapshot. Disabled by default (the low-mem
    # prod host has no cache Redis); the docker-compose.cache.yml overlay / staging enable it.
    redis:
      enabled: ${MAP_ROUTE_CACHE_REDIS_ENABLED:false}
      base-ttl: ${MAP_ROUTE_CACHE_REDIS_BASE_TTL:PT5M}
      ttl-jitter: ${MAP_ROUTE_CACHE_REDIS_TTL_JITTER:0.2}
      max-payload-bytes: ${MAP_ROUTE_CACHE_REDIS_MAX_PAYLOAD_BYTES:16384}
      lease-ttl: ${MAP_ROUTE_CACHE_REDIS_LEASE_TTL:PT10S}
      lease-wait: ${MAP_ROUTE_CACHE_REDIS_LEASE_WAIT:PT2S}
      lease-backoff: ${MAP_ROUTE_CACHE_REDIS_LEASE_BACKOFF:PT0.05S}
  circuit-breaker:
    sliding-window-size: ${MAP_PROVIDER_CB_SLIDING_WINDOW_SIZE:20}
    minimum-number-of-calls: ${MAP_PROVIDER_CB_MINIMUM_CALLS:10}
    failure-rate-threshold: ${MAP_PROVIDER_CB_FAILURE_RATE:50}
    wait-duration-in-open-state: ${MAP_PROVIDER_CB_OPEN_DURATION:PT30S}
    permitted-calls-in-half-open-state: ${MAP_PROVIDER_CB_HALF_OPEN_CALLS:3}
  cities:
    enabled: []

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    # The cache Redis is an OPTIONAL, disposable dependency — its absence must not mark map-service
    # DOWN. Cache/lease failures already degrade to the MySQL/provider path.
    redis:
      enabled: ${MANAGEMENT_HEALTH_REDIS_ENABLED:false}
