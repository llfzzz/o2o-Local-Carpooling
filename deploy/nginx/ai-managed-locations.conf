# Managed by ai for the personal homepage and project demos.

location = /api/health {
    proxy_pass http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /api/site-content {
    proxy_pass http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /o2o {
    return 301 /o2o/;
}

location = /o2o-admin {
    return 301 /o2o-admin/;
}

location = /o2o-api {
    return 301 /o2o-api/;
}

location ^~ /o2o-api/ {
    proxy_pass http://127.0.0.1:8120/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 240s;
    proxy_read_timeout 240s;
    send_timeout 240s;
    client_max_body_size 20m;
    # Live driver location is delivered as Server-Sent Events. Buffering would hold each event
    # until the buffer filled, which for a 3s heartbeat means the rider sees nothing for minutes.
    proxy_buffering off;
    proxy_cache off;
}

# AMap JS API service proxy.
#
# The JSAPI security code must never reach the browser, so instead of inlining it via
# window._AMapSecurityConfig.securityJsCode we point the SDK's serviceHost here (see
# src/lib/amapLoader.ts) and append the code server-side. A leaked browser key alone is then not
# enough to call AMap's web services.
#
# Set $amap_jscode below to the JSAPI security code before enabling on a host that has one.
location ^~ /_AMapService/ {
    proxy_pass https://restapi.amap.com/;
    proxy_http_version 1.1;
    proxy_set_header Host restapi.amap.com;
    proxy_ssl_server_name on;
    # AMap expects the security code appended to the original query string. Built into a separate
    # variable first so the empty-query and non-empty-query cases cannot both apply.
    set $amap_jscode "";
    set $amap_args "jscode=$amap_jscode";
    if ($args != "") {
        set $amap_args "$args&jscode=$amap_jscode";
    }
    set $args $amap_args;
    proxy_connect_timeout 10s;
    proxy_read_timeout 20s;
}

location ^~ /o2o/assets/ {
    alias /var/www/o2o-Local-Carpooling/apps/user-h5/dist/assets/;
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

location ^~ /o2o/ {
    alias /var/www/o2o-Local-Carpooling/apps/user-h5/dist/;
    try_files $uri $uri/ /o2o/index.html;
    add_header Cache-Control "no-cache";
}

location ^~ /o2o-admin/assets/ {
    alias /var/www/o2o-Local-Carpooling/apps/admin-console/dist/assets/;
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
}

location ^~ /o2o-admin/ {
    alias /var/www/o2o-Local-Carpooling/apps/admin-console/dist/;
    try_files $uri $uri/ /o2o-admin/index.html;
    add_header Cache-Control "no-cache";
}

location = /office-agent {
    return 301 /office-agent/;
}

location /office-agent/ {
    client_max_body_size 30m;
    proxy_pass http://127.0.0.1:8788/;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

location = /office-agent-db {
    return 302 /office-agent-db/_/;
}

location /office-agent-db/ {
    proxy_pass http://127.0.0.1:8090/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
