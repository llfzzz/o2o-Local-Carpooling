# Low-memory overlay for small VPS demo deployments. It keeps the same local-only
# ports and demo behavior, but narrows container memory and JVM settings so the
# stack degrades into swap instead of exhausting RAM immediately.
services:
  mysql:
    mem_limit: 384m
    cpus: 0.35
    command:
      - mysqld
      - --performance-schema=OFF
      - --innodb-buffer-pool-size=96M
      - --max-connections=40
      - --table-open-cache=256

  redis:
    mem_limit: 96m
    cpus: 0.15
    # Every key this app stores in Redis is security/correctness state carrying its own TTL
    # (SMS codes + attempt counters, refresh tokens, payment replay nonces, rate-limit windows,
    # driver presence). There is NO ordinary evictable cache in Redis — the map route cache lives
    # in MySQL. So an LRU/random eviction policy is pure downside: it can silently drop a valid
    # refresh token or an unexpired replay nonce, enabling webhook replay or a mass logout.
    # `noeviction` makes an over-budget write fail loudly (surfaced by monitoring / the store's
    # fail path) instead of corrupting security state. Size `maxmemory` to the real working set
    # per environment (64mb holds ~400k small keys — ample for demo; raise for production).
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 64mb
      - --maxmemory-policy
      - noeviction

  rabbitmq:
    mem_limit: 256m
    cpus: 0.25
    environment:
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: "0.40"

  mongodb:
    mem_limit: 256m
    cpus: 0.25
    command:
      - mongod
      - --wiredTigerCacheSizeGB
      - "0.10"
      - --bind_ip_all

  minio:
    mem_limit: 160m
    cpus: 0.20

  nacos:
    mem_limit: 384m
    cpus: 0.35
    environment:
      JVM_XMS: 96m
      JVM_XMX: 192m
      JVM_XMN: 48m
